<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PhotoView+</title>
    <!-- 关键内联样式：随 HTML 立即生效，不等 globals.css 模块加载，避免初始白底。 -->
    <style>
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #101112;
        color: #edf0ee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      @media (prefers-color-scheme: light) {
        html,
        body,
        #root {
          background: #f5f6f4;
          color: #171a18;
        }
      }
      .boot-splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        width: 100%;
        height: 100%;
      }
      .boot-splash__mark {
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #2f7dd3;
        color: #fff;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 1px;
      }
      .boot-splash__spinner {
        width: 22px;
        height: 22px;
        border: 2px solid rgba(127, 127, 127, 0.3);
        border-top-color: #2f7dd3;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      .boot-splash__text {
        font-size: 13px;
        opacity: 0.7;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- 启动占位：React 首次提交时会整体替换 #root 的内容。 -->
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash__mark">PV</div>
        <div class="boot-splash__spinner"></div>
        <div class="boot-splash__text">正在启动 PhotoView+…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
